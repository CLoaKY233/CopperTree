# =============================================================================
# CopperTree Docker Compose
#
# Eval mode (recommended for reviewers):
#   docker compose --profile eval up --exit-code-from eval-runner
#
# Full stack (Temporal + live workflows):
#   docker compose --profile full up
#
# Both profiles read API keys and MONGO_URI from your .env file (cloud MongoDB).
# =============================================================================

services:
  # ── Eval profile: one-shot pipeline container ────────────────────
  eval-runner:
    build: .
    command: ["/bin/bash", "scripts/docker_eval_entrypoint.sh"]
    env_file: .env
    environment:
      - EVAL_MODE=true
      - EVAL_N=${EVAL_N:-5}
      - EVAL_SEED=${EVAL_SEED:-42}
      - EVAL_AGENT=${EVAL_AGENT:-assessment}
      - EVAL_ITERATIONS=${EVAL_ITERATIONS:-1}
    volumes:
      - ./data:/app/data
    profiles: ["eval"]

  # ── Full profile: long-running workflow worker ──────────────────
  worker:
    build: .
    env_file: .env
    environment:
      - TEMPORAL_HOST=temporal:7233
      - EVAL_MODE=${EVAL_MODE:-false}
    depends_on:
      temporal:
        condition: service_started
    restart: on-failure
    profiles: ["full"]

  # ── Full profile: DB seeder ─────────────────────────────────────
  seeder:
    build: .
    command: ["uv", "run", "python", "scripts/seed_db.py"]
    env_file: .env
    restart: "no"
    profiles: ["full"]

  # ── Full profile: Temporal + postgres ───────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      - temporal-db
    profiles: ["full"]

  temporal-db:
    image: postgres:15
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_data:/var/lib/postgresql/data
    profiles: ["full"]

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    profiles: ["full"]

volumes:
  temporal_data:
